name: PromptGlass

options:
  bundleIdPrefix: com.promptglass
  deploymentTarget:
    macOS: "14.0"
  defaultConfig: Debug
  xcodeVersion: "16"

settings:
  base:
    SWIFT_VERSION: "5.10"
    MACOSX_DEPLOYMENT_TARGET: "14.0"
    PRODUCT_BUNDLE_IDENTIFIER: com.promptglass.PromptGlass
    DEVELOPMENT_TEAM: ""

targets:
  PromptGlass:
    type: application
    platform: macOS
    deploymentTarget: "14.0"
    sources:
      - path: PromptGlass
        createIntermediateGroups: true
    settings:
      base:
        INFOPLIST_FILE: PromptGlass/Info.plist
        CODE_SIGN_ENTITLEMENTS: PromptGlass/PromptGlass.entitlements
        PRODUCT_NAME: PromptGlass
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
    entitlements:
      path: PromptGlass/PromptGlass.entitlements
      properties:
        com.apple.security.app-sandbox: true
        com.apple.security.device.audio-input: true
        com.apple.security.files.user-selected.read-write: true
        com.apple.security.network.client: true
    info:
      path: PromptGlass/Info.plist
      properties:
        CFBundleName: PromptGlass
        CFBundleDisplayName: PromptGlass
        CFBundleIdentifier: com.promptglass.PromptGlass
        CFBundleVersion: "2"
        CFBundleShortVersionString: "1.0.1"
        NSPrincipalClass: NSApplication
        NSMicrophoneUsageDescription: "PromptGlass needs microphone access to follow along with your narration."
        NSSpeechRecognitionUsageDescription: "PromptGlass uses speech recognition to highlight the word you are currently speaking."
        NSHighResolutionCapable: true
        CFBundleIconFile: AppIcon

  PromptGlassTests:
    type: bundle.unit-test
    platform: macOS
    deploymentTarget: "14.0"
    sources:
      - path: PromptGlassTests
        createIntermediateGroups: true
    dependencies:
      - target: PromptGlass
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.promptglass.PromptGlassTests
        GENERATE_INFOPLIST_FILE: YES

schemes:
  PromptGlass:
    build:
      targets:
        PromptGlass: all
        PromptGlassTests: testing
    run:
      config: Debug
    test:
      config: Debug
      targets:
        - PromptGlassTests
    profile:
      config: Release
    analyze:
      config: Debug
    archive:
      config: Release
